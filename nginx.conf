# =============================================================================
# ZerosAndOnes Website — nginx site config
# -----------------------------------------------------------------------------
# Serves the Vite production bundle out of /usr/share/nginx/html on port 4500.
# The app is a React Router SPA, so unknown paths fall through to /index.html
# and the client-side router picks them up.
# =============================================================================

server {
    listen       4500;
    listen       [::]:4500;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Basic hardening / cleaner responses.
    server_tokens off;
    charset       utf-8;

    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;

    # Vite emits hashed filenames into /assets — safe to cache aggressively.
    location /assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Common static asset types — cache for a week.
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp|avif|map)$ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # Never cache the entry document — new deploys must be picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — every unknown route serves index.html so react-router can
    # resolve it on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip text-like responses.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain
                      text/css
                      text/javascript
                      application/javascript
                      application/json
                      application/xml
                      image/svg+xml
                      font/ttf
                      font/otf;
}
